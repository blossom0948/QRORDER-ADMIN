<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>사장님 주문 관리</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="admin">
    <header class="admin-header">
      <div>
        <p>사장님 사이트</p>
        <h1>운영 대시보드</h1>
      </div>
      <div class="admin-header-actions">
        <button id="seedOrder" class="button secondary" type="button">테스트 주문</button>
        <button id="toggleSound" class="button ghost" type="button" aria-pressed="false">딩동 알림 켜기</button>
      </div>
    </header>

    <main class="admin-shell">
      <section class="metrics" aria-label="주문 현황">
        <div>
          <span id="pendingCount">0</span>
          <small>대기</small>
        </div>
        <div>
          <span id="cookingCount">0</span>
          <small>조리중</small>
        </div>
        <div>
          <span id="servedCount">0</span>
          <small>완료</small>
        </div>
        <div>
          <span id="todaySales">0원</span>
          <small>주문액</small>
        </div>
      </section>

      <section class="admin-command-center" aria-label="운영 요약">
        <div id="alertPanel" class="alert-panel">
          <div>
            <p>알림 센터</p>
            <h2 id="alertTitle">새 주문 대기 중</h2>
          </div>
          <span id="soundState" class="sound-state">알림 꺼짐</span>
          <p id="alertMessage">영업 시작 전에 딩동 알림을 켜두면 새 주문과 직원 호출을 바로 들을 수 있습니다.</p>
        </div>
        <div class="ops-grid">
          <div>
            <span id="activeTableCount">0</span>
            <small>진행 테이블</small>
          </div>
          <div>
            <span id="serviceCount">0</span>
            <small>직원 호출 대기</small>
          </div>
          <div>
            <span id="soldOutCount">0</span>
            <small>품절 메뉴</small>
          </div>
          <div>
            <span id="oldestWait">0분</span>
            <small>가장 오래 대기</small>
          </div>
        </div>
      </section>

      <section aria-labelledby="ordersTitle">
        <div class="section-heading">
          <p>실시간 주문 확인</p>
          <h2 id="ordersTitle">주문 보드</h2>
        </div>
        <div class="order-toolbar">
          <div class="filter-chips" role="tablist" aria-label="주문 필터">
            <button class="active" type="button" data-order-filter="all">전체</button>
            <button type="button" data-order-filter="food">음식 주문</button>
            <button type="button" data-order-filter="service">직원 호출</button>
          </div>
          <span id="boardHint">대기 주문이 들어오면 딩동 알림과 함께 이 보드에 표시됩니다.</span>
        </div>
        <div id="orderBoard" class="kanban" aria-live="polite"></div>
      </section>

      <details class="menu-manage-panel">
        <summary>
          <div class="section-heading">
            <p>메뉴 설정</p>
            <h2 id="menuManageTitle">메뉴판 관리</h2>
          </div>
          <span>열기</span>
        </summary>
        <form id="addMenuForm" class="menu-add-form">
          <div class="form-title">
            <strong>메뉴 추가</strong>
            <span>이름, 카테고리, 가격만 입력하면 바로 손님 화면에 표시됩니다.</span>
          </div>
          <label>
            메뉴명
            <input name="name" required placeholder="예: 물냉면" />
          </label>
          <label>
            카테고리
            <select name="category">
              <option value="main">메인</option>
              <option value="side">사이드</option>
              <option value="drink">음료</option>
            </select>
          </label>
          <label>
            가격
            <input name="price" type="number" min="0" step="500" required placeholder="9000" />
          </label>
          <label>
            설명
            <input name="desc" placeholder="손님 화면에 보일 짧은 설명" />
          </label>
          <label>
            배지
            <input name="badge" placeholder="추천, 인기 등" />
          </label>
          <label>
            사진 파일
            <input name="imageFile" type="file" accept="image/*" />
          </label>
          <button class="button primary" type="submit">메뉴 추가</button>
        </form>
        <div id="menuManager" class="menu-manager"></div>
      </details>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
